name: Auto Sign

on:
  schedule:
    # 00:00 UTC = 08:00 Asia/Shanghai
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sign:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TOKEN: ${{ secrets.NTE_TOKEN }}
      EXIT_WHEN_FAIL: on
      NO_PAUSE: "1"
      TZ: Asia/Shanghai

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Check token secret
        shell: bash
        run: |
          if [ -z "$TOKEN" ]; then
            echo "NTE_TOKEN secret is not configured."
            echo "Add it in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Run auto sign
        run: python nte.py
